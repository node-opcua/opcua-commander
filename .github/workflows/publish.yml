name: publish

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      dist-tag:
        description: "dist-tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - next
          - rc
          - beta
          - alpha

permissions:
  id-token: write # Required for OIDC token generation
  contents: read # Required for actions/checkout

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Set up Git user
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor}}@users.noreply.github.com"

      - name: "Verify NPM registry connectivity"
        run: npm ping

      - name: "Stash build artifacts before publish"
        run: git stash

      - name: Publish to NPM
        run: |
          # Remove the pre-configured _authToken written by actions/setup-node so that
          # the NODE_AUTH_TOKEN repo variable (if set to a placeholder) cannot interfere.
          # Authentication relies on npm Trusted Publishing (OIDC via id-token: write).
          # PREREQUISITE: npm Trusted Publishing must be configured for this repository
          # before this workflow can succeed. Configure it at:
          # https://www.npmjs.com/package/opcua-commander/access
          # (Publishing Access → "Allow publishing from GitHub Actions using OIDC")
          npm config delete //registry.npmjs.org/:_authToken
          DIST_TAG="${{ github.event.inputs.dist-tag || 'latest' }}"
          npm publish --tag "$DIST_TAG"
        env:
          NPM_CONFIG_PROVENANCE: true

