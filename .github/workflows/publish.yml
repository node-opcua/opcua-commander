name: publish

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      dist-tag:
        description: "dist-tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - next
          - rc
          - beta
          - alpha

permissions:
  id-token: write # Required for OIDC token generation
  contents: read # Required for actions/checkout

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Set up Git user
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor}}@users.noreply.github.com"

      - name: "Verify NPM Authentication (Preflight)"
        run: |
          echo "Pinging npm registry..."
          npm ping
          echo "Verifying authenticated user..."
          npm whoami
          echo "Verifying package ownership on registry..."
          npm owner ls opcua-commander
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "detect unwanted changes"
        run: |
          git status
      - name: "stash unwanted changes"
        run: |
          git stash

      - name: Publish to NPM
        run: |
          DIST_TAG="${{ github.event.inputs.dist-tag || 'latest' }}"
          npm publish --tag "$DIST_TAG"
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

